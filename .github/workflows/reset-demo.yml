name: Reset demo (24h)

on:
  schedule:
    # 06:00 UTC todos los días (ajusta a tu zona horaria preferida)
    - cron: '0 6 * * *'
  workflow_dispatch: {} # Permite ejecutar el reset manualmente desde la pestaña Actions

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar secreto DEMO_DATABASE_URL
        run: |
          if [ -z "${{ secrets.DEMO_DATABASE_URL }}" ]; then
            echo "ERROR: El secreto DEMO_DATABASE_URL no está configurado."
            echo "Ve a Settings > Secrets and variables > Actions y crea DEMO_DATABASE_URL"
            echo "con el DATABASE_URL (pooler 6543) de la base de la demo en Vercel."
            exit 1
          fi
          echo "Secreto DEMO_DATABASE_URL presente."

      - name: Resetear base de datos del demo
        run: |
          # Normaliza el secreto a postgresql:// (Supabase suele dar postgres://)
          # y quita posibles saltos de línea/BOM que rompen la validación de Prisma.
          RAW="${{ secrets.DEMO_DATABASE_URL }}"
          NORM="$(printf '%s' "$RAW" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's/^postgres:\/\//postgresql:\/\//')"
          echo "Protocolo recibido: ${NORM%%://*}"
          DATABASE_URL="$NORM" node scripts/reset_demo.mjs
